name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the release and upload artifacts
  id-token: write # keyless cosign signing via GitHub OIDC
  attestations: write # build-provenance attestations

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          check-latest: true
      # cosign signs the checksums; syft generates the SBOMs (both invoked by goreleaser).
      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # SLSA build provenance for each released archive.
      - name: Attest release binaries
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip

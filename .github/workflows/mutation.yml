name: mutation

on:
  schedule:
    - cron: "0 4 * * *" # nightly at 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gremlins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          check-latest: true
      - name: Install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@v0.6.0
      - name: Mutation test the deterministic core
        # .gremlins.yaml sets the efficacy 90 threshold; gremlins exits non-zero
        # (10) when it is not met, failing the job.
        run: gremlins unleash ./internal/policy/ ./internal/meter/

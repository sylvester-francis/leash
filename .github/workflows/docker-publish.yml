name: docker

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git tag to build and publish (e.g. v0.1.1)"
        required: true
        default: "v0.1.1"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - id: ver
        # Tag name without the leading v (v0.1.1 -> 0.1.1) for the image tag and
        # the stamped build version. Move :latest only for a real release: a
        # prerelease tag (e.g. v0.2.0-rc1, which has a hyphen) must not.
        run: |
          REF="${{ github.event.inputs.ref || github.ref_name }}"
          VER="${REF#v}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          TAGS="ghcr.io/${{ github.repository }}:$VER"
          case "$VER" in
            *-*) ;;                                                   # prerelease: no :latest
            *) TAGS="$TAGS,ghcr.io/${{ github.repository }}:latest" ;;
          esac
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.ver.outputs.tags }}
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}

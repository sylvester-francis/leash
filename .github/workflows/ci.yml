name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          check-latest: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      - run: go test -race ./...
      - run: make ascii-check
      - run: make doc-check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          check-latest: true
      - run: make lint

  smoke:
    # End-to-end: brings up the fake upstream and a governed gateway and asserts
    # a call is metered, the cost budget trips, and the admin surface responds.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          check-latest: true
      - run: bash examples/demos/smoke.sh

  windows-build:
    # Signal forwarding to children is not supported on Windows (guarded by a
    # GOOS build tag), so the full suite is not run here. The ledger package is,
    # so the Windows LockFileEx single-governor lock is exercised, not just built.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          check-latest: true
      - run: go build ./...
      - name: Exercise the SQLite governor lock on Windows
        run: go test ./internal/ledger/ -run 'GovernorIsSingle|Idempotent|AtMostOnce' -v

  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: leash
          POSTGRES_DB: leash
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          check-latest: true
      - name: Run postgres-gated ledger tests
        env:
          LEASH_TEST_POSTGRES_DSN: postgres://postgres:leash@localhost:5432/leash?sslmode=disable
        run: go test ./internal/ledger/ -run Backend -v

  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          check-latest: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: check
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: build --snapshot --clean

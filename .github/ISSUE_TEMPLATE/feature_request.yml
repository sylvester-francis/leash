name: Feature request
description: Propose a capability or change
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        leash aims to stay small and one-dependency (see docs/adr/0004). The most
        useful requests name a concrete problem, not just a feature.
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that leash makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What you would like leash to do. Sketch the flag, endpoint, or behavior.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What you tried or ruled out, and why.
